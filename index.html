<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Systro Solutions — Home</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f1720;
      --bg-soft: #16212d;
      --line: rgba(255,255,255,0.08);
      --text: #f5f7fa;
      --muted: rgba(245,247,250,0.72);
      --accent: #4f8f6b;
      --accent-2: #5fa7c8;
      --white: #ffffff;
      --gray: #cfd6dc;
      --shadow: 0 18px 60px rgba(0,0,0,0.28);
      --radius-full: 999px;
      --radius-lg: 24px;
      --radius-md: 16px;
      --container: min(1180px, calc(100% - 32px));
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Inter", system-ui, sans-serif;
      background: #0b1118;
      color: var(--text);
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: var(--container);
      margin: 0 auto;
    }

    .top-bar {
      background: #000000;
      color: #ffffff;
      text-align: center;
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .site-shell {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 20%, rgba(95,167,200,0.12), transparent 22%),
        linear-gradient(to bottom, #14202b 0%, #0f1720 100%);
      min-height: 100vh;
    }

    .site-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 120px 120px;
      opacity: 0.22;
      pointer-events: none;
    }

    .site-header {
      position: relative;
      z-index: 3;
      padding: 18px 0 8px;
    }

    .header-inner {
      width: var(--container);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 20px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 20px;
      justify-content: flex-start;
      flex-wrap: wrap;
    }

    .nav-left a {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .nav-left a:hover {
      color: var(--white);
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .nav-right {
      display: flex;
      justify-content: flex-end;
    }

    .hero {
      position: relative;
      z-index: 2;
      padding: 34px 0 0;
    }

    .hero-inner {
      width: var(--container);
      margin: 0 auto;
      text-align: center;
    }

    .hero-decor {
      position: relative;
      width: 100%;
      height: 60px;
      margin-bottom: 10px;
    }

    .shape {
      position: absolute;
      border-radius: 999px 999px 0 0;
      background: var(--accent);
      opacity: 0.95;
    }

    .shape-left {
      width: 40px;
      height: 22px;
      left: 17%;
      top: 18px;
    }

    .shape-right {
      width: 34px;
      height: 18px;
      right: 18%;
      top: 28px;
      background: var(--accent-2);
    }

    .shape-top {
      width: 94px;
      height: 54px;
      left: 50%;
      transform: translateX(-50%);
      top: 0;
      border-radius: 999px;
      background: var(--accent-2);
      filter: blur(0.2px);
    }

    .shape-gray-left,
    .shape-gray-right {
      position: absolute;
      width: 30px;
      height: 14px;
      background: rgba(255,255,255,0.48);
      border-radius: 999px 999px 0 0;
    }

    .shape-gray-left {
      left: 7%;
      top: 44px;
    }

    .shape-gray-right {
      right: 23%;
      top: 20px;
    }

    .hero-title {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(46px, 7vw, 88px);
      line-height: 0.95;
      letter-spacing: -0.05em;
      max-width: 760px;
      margin: 0 auto 18px;
      color: #f8f9fb;
    }

    .hero-copy {
      max-width: 540px;
      margin: 0 auto 20px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--gray);
    }

    .hero-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 20px;
      border-radius: var(--radius-full);
      background: var(--accent);
      color: #ffffff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      box-shadow: var(--shadow);
      text-transform: uppercase;
    }

    .hero-btn:hover {
      background: var(--accent-2);
    }

    .hero-gallery {
      position: relative;
      margin-top: 42px;
      padding-bottom: 24px;
    }

    .gallery-row {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr 1.1fr 1fr 0.9fr;
      align-items: end;
      gap: 0;
      min-height: 320px;
    }

    .gallery-card {
      position: relative;
      overflow: hidden;
      border-right: 1px solid rgba(255,255,255,0.08);
      background: #1a1f25;
    }

    .gallery-card:last-child {
      border-right: none;
    }

    .gallery-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: contrast(1.02) saturate(0.9);
    }

    .gallery-card.tall {
      height: 255px;
    }

    .gallery-card.mid {
      height: 220px;
    }

    .gallery-card.short {
      height: 200px;
    }

    .gallery-overlay-tag {
      position: absolute;
      left: 12px;
      bottom: 12px;
      padding: 6px 10px;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: var(--radius-full);
      background: rgba(10,15,20,0.58);
      color: #ffffff;
      backdrop-filter: blur(10px);
    }

    .hero-bottom-fade {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 120px;
      background: linear-gradient(to bottom, rgba(11,17,24,0) 0%, rgba(11,17,24,0.95) 100%);
      pointer-events: none;
    }

    @media (max-width: 980px) {
      .header-inner {
        grid-template-columns: 1fr;
        justify-items: center;
      }

      .nav-left,
      .nav-right {
        justify-content: center;
      }

      .hero-title {
        max-width: 10ch;
      }

      .gallery-row {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .gallery-card {
        border-right: none;
        border-radius: 18px;
        overflow: hidden;
      }
    }

    @media (max-width: 640px) {
      .top-bar {
        font-size: 10px;
        letter-spacing: 0.16em;
      }

      .nav-left {
        justify-content: center;
        gap: 12px 16px;
      }

      .hero {
        padding-top: 22px;
      }

      .hero-title {
        font-size: clamp(40px, 13vw, 60px);
        max-width: 100%;
      }

      .hero-copy {
        font-size: 13px;
      }

      .gallery-row {
        grid-template-columns: 1fr;
      }

      .gallery-card.tall,
      .gallery-card.mid,
      .gallery-card.short {
        height: 220px;
      }
    }
  </style>
</head>
<body>
  <div class="top-bar">BE PURPOSEFULLY PROFITABLE</div>

  <div class="site-shell">
    <header class="site-header">
      <div class="header-inner">
        <nav class="nav-left" aria-label="Primary navigation">
          <a href="#">ABOUT</a>
          <a href="#">SERVICES</a>
          <a href="#">SYSTRO ASSESSMENT</a>
          <a href="#">PROGRAM</a>
          <a href="#">FREE RESOURCES</a>
          <a href="#">CONTACT</a>
        </nav>

        <a href="#" class="logo" aria-label="Systro Solutions">
          Systro
        </a>

        <div class="nav-right"></div>
      </div>
    </header>

    <main class="hero">
      <div class="hero-inner">
        <div class="hero-decor" aria-hidden="true">
          <span class="shape shape-left"></span>
          <span class="shape shape-top"></span>
          <span class="shape shape-right"></span>
          <span class="shape-gray-left"></span>
          <span class="shape-gray-right"></span>
        </div>

        <h1 class="hero-title">
          We bring fulfillment<br>
          To your work and your<br>
          life
        </h1>

        <p class="hero-copy">
          Systro Solutions helps small business owners become Purposefully Profitable through strategy and organization.
        </p>

        <a href="#" class="hero-btn">OUR SERVICES</a>

        <section class="hero-gallery" aria-label="Featured visual collage">
          <div class="gallery-row">
            <article class="gallery-card short">
              <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=700&q=80" alt="Professional working scene" width="700" height="900" loading="lazy">
              <span class="gallery-overlay-tag">Strategy</span>
            </article>

            <article class="gallery-card tall">
              <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=700&q=80" alt="Business professional portrait" width="700" height="900" loading="lazy">
            </article>

            <article class="gallery-card mid">
              <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=900&q=80" alt="Team collaboration meeting" width="900" height="700" loading="lazy">
              <span class="gallery-overlay-tag">Growth</span>
            </article>

            <article class="gallery-card tall">
              <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?auto=format&fit=crop&w=700&q=80" alt="Creative planning workspace" width="700" height="900" loading="lazy">
            </article>

            <article class="gallery-card mid">
              <img src="https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?auto=format&fit=crop&w=700&q=80" alt="Professional smiling portrait" width="700" height="900" loading="lazy">
            </article>
          </div>
          <div class="hero-bottom-fade"></div>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
