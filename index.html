<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Systro Solutions – Animated Sky Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --sky-top: #74c0ff;
      --sky-mid: #a5d9ff;
      --sky-bottom: #f8f9ff;
      --cloud: #ffffff;
      --cloud-shadow: rgba(0, 0, 0, 0.06);
      --sun: #ffe66d;
      --bird: #1c3d5a;
      --overlay: rgba(255, 255, 255, 0.15);
      --text-main: #0b213b;
      --text-sub: #34556f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* Cielo anime */

    .sky-scene {
      position: relative;
      width: 100%;
      height: 100vh;
      background: linear-gradient(to bottom,
        var(--sky-top) 0%,
        var(--sky-mid) 40%,
        var(--sky-bottom) 100%);
      overflow: hidden;
    }

    .sky-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.4) 0, transparent 50%);
      mix-blend-mode: screen;
      pointer-events: none;
    }

    /* Sol estilo ilustración */

    .sun {
      position: absolute;
      top: 8%;
      left: 14%;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle,
        var(--sun) 0%,
        #ffd43b 40%,
        rgba(255, 255, 255, 0) 70%);
      box-shadow: 0 0 40px rgba(255, 230, 109, 0.9);
      animation: sunGlow 6s ease-in-out infinite alternate;
    }

    @keyframes sunGlow {
      0% { transform: scale(1); opacity: 0.9; }
      100% { transform: scale(1.05); opacity: 1; }
    }

    /* Nubes animadas */

    .cloud {
      position: absolute;
      background: var(--cloud);
      box-shadow: 0 10px 30px var(--cloud-shadow);
      border-radius: 40px;
      opacity: 0.95;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: var(--cloud);
      border-radius: 50px;
    }

    .cloud.cloud-1 {
      width: 220px;
      height: 60px;
      top: 16%;
      left: -260px;
      animation: cloudDrift1 55s linear infinite;
    }

    .cloud.cloud-1::before {
      width: 120px;
      height: 80px;
      top: -40px;
      left: 30px;
    }

    .cloud.cloud-1::after {
      width: 90px;
      height: 70px;
      top: -30px;
      right: 20px;
    }

    .cloud.cloud-2 {
      width: 260px;
      height: 70px;
      top: 32%;
      left: 100%;
      animation: cloudDrift2 70s linear infinite;
    }

    .cloud.cloud-2::before {
      width: 130px;
      height: 80px;
      top: -40px;
      left: 40px;
    }

    .cloud.cloud-2::after {
      width: 100px;
      height: 70px;
      top: -30px;
      right: 25px;
    }

    .cloud.cloud-3 {
      width: 180px;
      height: 55px;
      top: 22%;
      left: 60%;
      animation: cloudDrift3 65s linear infinite;
    }

    .cloud.cloud-3::before {
      width: 110px;
      height: 75px;
      top: -35px;
      left: 20px;
    }

    .cloud.cloud-3::after {
      width: 80px;
      height: 65px;
      top: -28px;
      right: 18px;
    }

    @keyframes cloudDrift1 {
      0%   { transform: translateX(0); }
      100% { transform: translateX(140vw); }
    }

    @keyframes cloudDrift2 {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-140vw); }
    }

    @keyframes cloudDrift3 {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-120vw); }
    }

    /* Aves */

    .bird {
      position: absolute;
      width: 32px;
      height: 18px;
      color: var(--bird);
    }

    .bird::before,
    .bird::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 16px 16px 0 0;
      border-top: 3px solid var(--bird);
      border-left: 3px solid var(--bird);
      border-right: 3px solid transparent;
      border-bottom: 3px solid transparent;
      transform-origin: center bottom;
    }

    .bird::before {
      left: 0;
      transform: rotate(-18deg);
    }

    .bird::after {
      right: 0;
      transform: rotate(18deg);
    }

    .bird.bird-1 {
      top: 26%;
      left: -10%;
      animation: birdFly1 45s linear infinite;
    }

    .bird.bird-2 {
      top: 18%;
      left: 110%;
      animation: birdFly2 50s linear infinite;
    }

    .bird.bird-3 {
      top: 35%;
      left: -20%;
      animation: birdFly3 55s linear infinite;
    }

    @keyframes birdFly1 {
      0%   { transform: translateX(0) translateY(0) scale(1); }
      50%  { transform: translateX(60vw) translateY(-10px) scale(1.05); }
      100% { transform: translateX(120vw) translateY(5px) scale(1.1); }
    }

    @keyframes birdFly2 {
      0%   { transform: translateX(0) translateY(0) scale(0.9); }
      50%  { transform: translateX(-60vw) translateY(12px) scale(1); }
      100% { transform: translateX(-120vw) translateY(-6px) scale(1.05); }
    }

    @keyframes birdFly3 {
      0%   { transform: translateX(0) translateY(0) scale(0.95); }
      50%  { transform: translateX(70vw) translateY(10px) scale(1.05); }
      100% { transform: translateX(140vw) translateY(-5px) scale(1.1); }
    }

    /* Contenido (para que pongas el home de Systro encima) */

    .content-wrapper {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      pointer-events: none; /* el fondo es lo principal por ahora */
    }

    .content-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(14px);
      border-radius: 24px;
      padding: 28px 32px;
      max-width: 620px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.25);
      pointer-events: auto;
    }

    .content-title {
      font-size: clamp(34px, 4vw, 46px);
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 14px;
    }

    .content-subtitle {
      font-size: 16px;
      color: var(--text-sub);
      margin-bottom: 22px;
    }

    .content-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .content-btn {
      padding: 10px 20px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.1s ease;
    }

    .content-btn--filled {
      background: #1c3d5a;
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(12, 33, 53, 0.4);
    }

    .content-btn--outline {
      background: transparent;
      color: #1c3d5a;
      border: 1px solid rgba(12, 33, 53, 0.4);
      backdrop-filter: blur(10px);
    }

    .content-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
    }

    @media (max-width: 768px) {
      .content-card {
        padding: 22px 20px;
        border-radius: 20px;
      }

      .content-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="sky-scene">
    <!-- Cielo y sol -->
    <div class="sun"></div>
    <div class="sky-overlay"></div>

    <!-- Nubes animadas -->
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>

    <!-- Aves -->
    <div class="bird bird-1"></div>
    <div class="bird bird-2"></div>
    <div class="bird bird-3"></div>

    <!-- Contenido del home (placeholder) -->
    <div class="content-wrapper">
      <div class="content-card">
        <h1 class="content-title">
          Animated Sky Home
        </h1>
        <p class="content-subtitle">
          Replace this text and buttons with Systro's message. The sky, clouds and birds are fully animated in CSS.
        </p>
        <div class="content-actions">
          <button class="content-btn content-btn--filled">Primary CTA</button>
          <button class="content-btn content-btn--outline">Secondary CTA</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
