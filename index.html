<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Systro Solutions – Image Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --text-main: #102033;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000000;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    /* Imagen de fondo ocupando toda la sección */
    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url("assets/Tips for Selling Your Operation.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 1;
    }

    /* Capa para oscurecer un poco y dar contraste al texto */
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
        rgba(0, 0, 0, 0.35) 0%,
        rgba(0, 0, 0, 0.15) 40%,
        rgba(0, 0, 0, 0.55) 100%);
      z-index: 2;
    }

    /* Contenedor del texto “serpenteando” alrededor de los brazos */
    .hero-text-path {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
    }

    .text-curve {
      position: relative;
      max-width: 480px;
      color: #ffffff;
      font-size: 18px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    /* Efecto serpenteado simple: cada span se desplaza en Y para simular curvas */
    .text-curve span {
      display: inline-block;
      padding-right: 6px;
    }

    .text-curve span:nth-child(odd) {
      transform: translateY(-6px);
    }

    .text-curve span:nth-child(even) {
      transform: translateY(6px);
    }

    .text-curve span:nth-child(4n) {
      transform: translateY(10px);
    }

    .text-curve span:nth-child(5n) {
      transform: translateY(-10px);
    }

    @media (max-width: 768px) {
      .text-curve {
        font-size: 14px;
        max-width: 320px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>

    <!-- Texto “serpenteando” alrededor (ajustado visualmente sobre la imagen) -->
    <div class="hero-text-path">
      <p class="text-curve">
        <!-- Escribe aquí el texto que quieres alrededor de los brazos -->
        <span>We</span>
        <span>bring</span>
        <span>fulfillment</span>
        <span>to</span>
        <span>your</span>
        <span>work</span>
        <span>and</span>
        <span>your</span>
        <span>life</span>
        <span>with</span>
        <span>purposeful</span>
        <span>systems</span>
        <span>and</span>
        <span>strategy</span>
      </p>
    </div>
  </section>
</body>
</html>
